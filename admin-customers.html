<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management - VoltMine Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/dark-style.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .customers-table {
            background: #1a2138;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a3552;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0f1624;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #d4af37;
            font-weight: 600;
            border-bottom: 2px solid #2a3552;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #fff;
        }

        tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
        }

        .btn-view {
            background: #3b82f6;
            color: white;
        }

        .btn-assign {
            background: #10b981;
            color: white;
        }

        .btn-payment {
            background: #f59e0b;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            border: none;
            border-radius: 6px;
            color: #0a0e1a;
            font-weight: 700;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a2138;
            border: 1px solid #2a3552;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            color: #d4af37;
        }

        .close-modal {
            background: none;
            border: none;
            color: #8b92a8;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8b92a8;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f1624;
            border: 1px solid #2a3552;
            border-radius: 6px;
            color: white;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            border: none;
            border-radius: 6px;
            color: #0a0e1a;
            font-weight: 700;
            cursor: pointer;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="voltmine-logo-light.svg" alt="VoltMine" class="logo">
            </div>
            <div class="nav-links">
                <a href="admin.html">Dashboard</a>
                <a href="admin-miners.html">Miners</a>
                <a href="admin-customers.html" class="active">Customers</a>
                <a href="admin-payments.html">Payments</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 20px;">
        <div id="alertBox"></div>

        <div class="top-bar">
            <h1>Customers</h1>
            <button class="btn-add" onclick="showAddCustomerModal()">➕ Add Customer</button>
        </div>

        <div class="customers-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>BTC Address</th>
                        <th>Balance</th>
                        <th>Miners</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Customer</h2>
                <button class="close-modal" onclick="closeCustomerModal()">×</button>
            </div>
            <form id="customerForm" onsubmit="saveCustomer(event)">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="customerEmail" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="customerPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>BTC Withdrawal Address (Optional)</label>
                    <input type="text" id="customerBtcAddress" placeholder="1A1zP1eP5Q...">
                </div>
                <button type="submit" class="btn-submit">Create Customer</button>
            </form>
        </div>
    </div>

    <!-- Assign Miner Modal -->
    <div id="assignMinerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Assign Miner</h2>
                <button class="close-modal" onclick="closeAssignMinerModal()">×</button>
            </div>
            <form id="assignMinerForm" onsubmit="assignMiner(event)">
                <input type="hidden" id="assignCustomerId">
                <div class="form-group">
                    <label>Select Miner *</label>
                    <select id="assignMinerId" required>
                        <option value="">Loading miners...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sale Price (USD) *</label>
                    <input type="number" step="0.01" id="assignPrice" required placeholder="600">
                </div>
                <button type="submit" class="btn-submit">Assign Miner</button>
            </form>
        </div>
    </div>

    <!-- Record Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record Payment</h2>
                <button class="close-modal" onclick="closePaymentModal()">×</button>
            </div>
            <form id="paymentForm" onsubmit="recordPayment(event)">
                <input type="hidden" id="paymentCustomerId">
                <div class="form-group">
                    <label>Amount (USD) *</label>
                    <input type="number" step="0.01" id="paymentAmountUsd" required>
                </div>
                <div class="form-group">
                    <label>Amount (BTC) *</label>
                    <input type="number" step="0.00000001" id="paymentAmountBtc" required>
                </div>
                <div class="form-group">
                    <label>Transaction Hash *</label>
                    <input type="text" id="paymentTxHash" required>
                </div>
                <div class="form-group">
                    <label>Package Type</label>
                    <select id="paymentPackage">
                        <option value="starter">Starter (1x S19)</option>
                        <option value="pro">Pro (5x S19)</option>
                        <option value="enterprise">Enterprise (10x S19)</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Record Payment</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.govoltmine.xyz/api';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'login.html';
        }

        loadCustomers();

        async function loadCustomers() {
            try {
                const response = await fetch(`${API_URL}/admin/customers`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    renderCustomers(data.customers || []);
                } else {
                    showAlert('Failed to load customers', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        function renderCustomers(customers) {
            const tbody = document.getElementById('customersTableBody');

            if (customers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">No customers yet. Click "Add Customer" to create one!</td></tr>';
                return;
            }

            tbody.innerHTML = customers.map(c => `
                <tr>
                    <td>#${c.id}</td>
                    <td>${c.email}</td>
                    <td>${c.btc_address || '<span style="color: #8b92a8;">Not set</span>'}</td>
                    <td>${c.balance_btc?.toFixed(8) || '0.00000000'} BTC</td>
                    <td>${c.miner_count || 0}</td>
                    <td>${new Date(c.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn-action btn-assign" onclick="showAssignMinerModal(${c.id})">Assign Miner</button>
                        <button class="btn-action btn-payment" onclick="showPaymentModal(${c.id})">Record Payment</button>
                    </td>
                </tr>
            `).join('');
        }

        function showAddCustomerModal() {
            document.getElementById('customerModal').classList.add('active');
        }

        function closeCustomerModal() {
            document.getElementById('customerModal').classList.remove('active');
            document.getElementById('customerForm').reset();
        }

        async function saveCustomer(event) {
            event.preventDefault();

            const data = {
                email: document.getElementById('customerEmail').value,
                password: document.getElementById('customerPassword').value,
                btc_address: document.getElementById('customerBtcAddress').value || null
            };

            try {
                const response = await fetch(`${API_URL}/admin/create-customer`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Customer created successfully!', 'success');
                    closeCustomerModal();
                    loadCustomers();
                } else {
                    showAlert(result.error || 'Failed to create customer', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function showAssignMinerModal(customerId) {
            document.getElementById('assignCustomerId').value = customerId;

            // Load available miners
            try {
                const response = await fetch(`${API_URL}/admin/physical-miners`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                const availableMiners = (data.miners || []).filter(m => m.status === 'available');

                const select = document.getElementById('assignMinerId');
                if (availableMiners.length === 0) {
                    select.innerHTML = '<option value="">No available miners</option>';
                } else {
                    select.innerHTML = availableMiners.map(m =>
                        `<option value="${m.id}">${m.serial_number} - ${m.model} (${m.hashrate} TH/s)</option>`
                    ).join('');
                }

                document.getElementById('assignMinerModal').classList.add('active');
            } catch (error) {
                showAlert('Error loading miners: ' + error.message, 'error');
            }
        }

        function closeAssignMinerModal() {
            document.getElementById('assignMinerModal').classList.remove('active');
        }

        async function assignMiner(event) {
            event.preventDefault();

            const data = {
                customer_id: parseInt(document.getElementById('assignCustomerId').value),
                miner_id: parseInt(document.getElementById('assignMinerId').value),
                purchase_price: parseFloat(document.getElementById('assignPrice').value)
            };

            try {
                const response = await fetch(`${API_URL}/admin/assign-miner`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Miner assigned successfully!', 'success');
                    closeAssignMinerModal();
                    loadCustomers();
                } else {
                    showAlert(result.error || 'Failed to assign miner', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        function showPaymentModal(customerId) {
            document.getElementById('paymentCustomerId').value = customerId;
            document.getElementById('paymentModal').classList.add('active');
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            document.getElementById('paymentForm').reset();
        }

        async function recordPayment(event) {
            event.preventDefault();

            const data = {
                customer_id: parseInt(document.getElementById('paymentCustomerId').value),
                amount_usd: parseFloat(document.getElementById('paymentAmountUsd').value),
                amount_btc: parseFloat(document.getElementById('paymentAmountBtc').value),
                tx_hash: document.getElementById('paymentTxHash').value,
                package_type: document.getElementById('paymentPackage').value
            };

            try {
                const response = await fetch(`${API_URL}/admin/record-payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Payment recorded successfully!', 'success');
                    closePaymentModal();
                    loadCustomers();
                } else {
                    showAlert(result.error || 'Failed to record payment', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { alertBox.innerHTML = ''; }, 5000);
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // Close modals on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
