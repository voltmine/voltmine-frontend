<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Go VoltMine | Professional Bitcoin Cloud Mining</title>
    <meta name="description" content="Access your Go VoltMine mining dashboard. Monitor earnings, manage miners, and withdraw Bitcoin.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cyber-effects.css">
    <link rel="stylesheet" href="css/logo-animation.css">
    <link rel="stylesheet" href="css/chatbot.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--dark);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: var(--gray);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .terms-checkbox {
            margin-bottom: 25px;
            display: flex;
            align-items: start;
            gap: 10px;
        }

        .terms-checkbox input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
        }

        .terms-checkbox label {
            font-size: 14px;
            color: var(--secondary);
            cursor: pointer;
        }

        .terms-checkbox a {
            color: var(--primary);
            text-decoration: underline;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--secondary);
        }

        .form-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .local-notice-small {
            background: var(--gray);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--secondary);
        }

        .compliance-mini {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .compliance-mini span {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="blockchain-grid"></div>
    <div class="auth-container">
        <div class="auth-card">
            <img src="voltmine-logo.svg" alt="VoltMine" style="max-width: 250px; margin-bottom: 20px;">
            <h2>Login to Your Account</h2>

            <div class="form-tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <div id="error" class="error"></div>
            <div id="success" class="success"></div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="terms-checkbox">
                    <input type="checkbox" id="loginTerms" required>
                    <label for="loginTerms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="contract.html" target="_blank">Co-Ownership Agreement</a></label>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Bitcoin Address (Optional)</label>
                    <input type="text" id="btcAddress" placeholder="For withdrawals">
                </div>
                <div class="terms-checkbox">
                    <input type="checkbox" id="registerTerms" required>
                    <label for="registerTerms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="contract.html" target="_blank">Co-Ownership Agreement</a></label>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div class="form-footer">
                <a href="index.html">← Back to Home</a>
            </div>

            <div class="local-notice-small">
                <strong>🏠 Locally Hosted Platform</strong>
                <p>Complies with privacy laws</p>
                <div class="compliance-mini">
                    <span title="India">🇮🇳</span>
                    <span title="Georgia">🇬🇪</span>
                </div>
                <p style="margin-top: 16px; font-size: 12px; color: #888; font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;">
                    Designed by an Indian &#127470;&#127475; in Georgia &#127468;&#127466; for the world &#127757;
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.govoltmine.xyz/api';

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }

            hideMessages();
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!document.getElementById('loginTerms').checked) {
                showError('You must accept the Terms of Service to continue');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect based on admin status
                    if (data.user.is_admin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                showError('Connection error. Make sure the backend server is running.');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();

            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const btc_address = document.getElementById('btcAddress').value;

            if (!document.getElementById('registerTerms').checked) {
                showError('You must accept the Terms of Service to continue');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, btc_address })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Account created! Redirecting...');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                showError('Connection error. Make sure the backend server is running.');
            }
        }
    </script>
    <script src="js/logo-animation.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
